<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>エルノーラ地図管理システム</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f0f2f5; --admin-bg: #ecf0f1; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background: var(--bg); color: #333; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; flex-shrink: 0; }
        .header h1 { margin: 0; font-size: 1.2rem; }
        button { cursor: pointer; border: none; border-radius: 4px; font-weight: bold; padding: 8px 15px; transition: 0.2s; }
        #auth-btn { background: white; color: var(--primary); }
        #back-btn { background: #34495e; color: white; margin-right: 15px; display: none; }
        
        #sound-toggle-btn { background: transparent; color: white; font-size: 1.5rem; padding: 0 10px; margin-right: 15px; display: flex; align-items: center; justify-content: center; }

        .app-container { display: flex; flex-grow: 1; overflow: hidden; }
        
        .sidebar { width: 320px; background: white; border-right: 2px solid #ddd; padding: 20px; box-sizing: border-box; display: none; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
        
        @media (max-width: 800px) {
            .app-container { flex-direction: column-reverse; }
            .sidebar { width: 100%; height: 45vh; border-right: none; border-top: 2px solid #ddd; padding: 15px; }
            .main-content { height: 55vh; padding: 10px; }
        }

        .sidebar-section { border: 1px solid #ccc; padding: 15px; margin-bottom: 15px; border-radius: 5px; background: #fafafa; }
        .sidebar-title { font-size: 1rem; margin: 0 0 10px 0; border-bottom: 2px solid #333; padding-bottom: 5px; color: #2c3e50; font-weight: bold; }
        .sidebar label { display: block; font-size: 0.8rem; font-weight: bold; margin-top: 10px; margin-bottom: 5px; }
        .sidebar input[type="text"], .sidebar input[type="range"], .sidebar input[type="color"] { width: 100%; box-sizing: border-box; margin-bottom: 5px; padding: 5px; border: 1px solid #ccc; border-radius: 3px; }
        .sidebar input[type="file"] { width: 100%; box-sizing: border-box; margin-bottom: 5px; font-size: 0.8rem; }
        .sidebar .checkbox-group { display: flex; align-items: center; gap: 10px; margin: 5px 0; }
        .sidebar input[type="checkbox"] { width: auto; }
        
        .preview-box { width: 100%; height: 80px; border: 1px dashed #aaa; margin-top: 5px; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 0.8rem; background-color: #eee; }
        
        .btn-full { width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #333; background: white; }
        .btn-full:hover { background: #eee; }
        .btn-apply { background: #3498db; color: white; border: none; }
        .btn-save { background: #e74c3c; color: white; border: none; font-size: 1.1rem; }

        .main-content { flex-grow: 1; padding: 20px; overflow: auto; display: flex; justify-content: center; align-items: flex-start; position: relative; }
        #map-viewport { position: relative; width: 100%; max-width: 1000px; background: white; box-shadow: 0 5px 20px rgba(0,0,0,0.1); touch-action: none; display: block; container-type: inline-size; }
        #map-image { width: 100%; display: block; user-select: none; -webkit-user-drag: none; }

        .map-marker {
            position: absolute; transform: translate(-50%, -50%);
            background-color: rgba(39, 174, 96, 0.9);
            color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; 
            transition: transform 0.1s; user-select: none; overflow: hidden; box-sizing: border-box;
            border-radius: 0.5em; box-shadow: 0 0.25em 0.6em rgba(0,0,0,0.3); text-shadow: 0.05em 0.05em 0.15em rgba(0,0,0,0.8);
            padding: 0.5em 1em; white-space: nowrap; min-width: 3em; min-height: 2em; border: 0.15em solid transparent; z-index: 10;
        }
        
        .map-marker.no-bg { background-color: transparent !important; box-shadow: none !important; text-shadow: 0.05em 0.05em 0.15em rgba(0,0,0,0.8) !important; padding: 0.2em 0.5em; min-width: auto; min-height: auto; }
        .map-marker.has-border { border-color: white; }
        .map-marker:hover { transform: translate(-50%, -50%) scale(1.05); z-index: 20; }
        body:not(.is-admin) .map-marker.is-label { cursor: default; }
        body:not(.is-admin) .map-marker.is-label:hover { transform: translate(-50%, -50%); z-index: 10; }
        .editing .map-marker { cursor: move; }
        .map-marker.selected { border-color: #f1c40f !important; z-index: 100 !important; box-shadow: 0 0 1em rgba(241, 196, 15, 0.8) !important; background-color: rgba(241, 196, 15, 0.2) !important; }
        body.is-admin .sidebar { display: flex; }

        #grid-view { display: none; width: 100%; max-width: 1200px; padding: 20px; box-sizing: border-box; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .grid-card { background: white; border: 1px solid #ccc; border-radius: 8px; padding: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .grid-card img { width: 100%; height: 150px; object-fit: cover; background: #eee; border-radius: 4px; margin-bottom: 10px; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; width: 90%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .modal-content input { width: 100%; padding: 10px; margin-bottom: 15px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
    </style>
</head>
<body>

<div class="header">
    <div style="display: flex; align-items: center;">
        <button id="back-btn" onclick="goBack()">◀ 戻る</button>
        <button id="sound-toggle-btn" onclick="toggleMute()" title="BGMのオン/オフ">🔊</button>
        <h1 id="map-title">国家全図</h1>
    </div>
    <button id="auth-btn" onclick="toggleAdmin()">管理者ログイン</button>
</div>

<audio id="bgm-player" loop></audio>

<div id="login-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <h3 style="margin-top:0; color:#2c3e50;">管理者ログイン</h3>
        <input type="password" id="login-pass" placeholder="パスワード (426463)">
        <input type="password" id="login-token" placeholder="GitHub Personal Access Token">
        <div style="display: flex; gap: 10px;">
            <button class="btn-full" style="background:#3498db; color:white; margin:0;" onclick="executeLogin()">ログイン</button>
            <button class="btn-full" style="background:#95a5a6; color:white; margin:0;" onclick="closeLogin()">キャンセル</button>
        </div>
    </div>
</div>

<div class="app-container">
    <div class="sidebar" id="sidebar">
        
        <div class="sidebar-section" style="background: #e8f4f8; border-color: #3498db; padding: 10px 15px;">
            <div class="sidebar-title" style="margin-bottom: 5px;">🗺️ 現在のマップ設定</div>
            
            <label style="margin-top: 5px;">マップ名</label>
            <input type="text" id="map-prop-title">
            
            <label style="margin-top: 10px;">背景画像 (自動アップロード)</label>
            <input type="text" id="map-prop-bg" placeholder="ファイル名が自動で入ります" oninput="updatePreview('map-bg-preview', this.value)">
            <input type="file" accept="image/png, image/jpeg" onchange="uploadImageToGitHub(this.files[0], 'map-prop-bg', 'map-bg-preview')">
            <div id="map-bg-preview" class="preview-box"></div>
            
            <label style="margin-top: 10px;">BGM (ファイル名 例: bgm.mp3)</label>
            <input type="text" id="map-prop-bgm" placeholder="mp3ファイル名を入力">
            
            <label style="margin-top: 10px;">BGM 音量 (<span id="map-bgm-vol-val">50</span>%)</label>
            <input type="range" id="map-prop-bgm-vol" min="0" max="100" value="50" oninput="updateLiveVolume(this.value)">
            
            <button onclick="applyMapSettings()" class="btn-full" style="background: #3498db; color: white; margin-top: 15px;">マップ設定を更新</button>
        </div>

        <button class="btn-full" style="border-color: #27ae60; color: #27ae60; font-weight: bold;" onclick="addNewMarker()">＋ 新しいボタンを配置</button>
        <button class="btn-full" style="border-color: #8e44ad; color: #8e44ad; font-weight: bold; margin-top: 5px;" onclick="addNewLabel()">＋ ラベル（文字のみ）を追加</button>
        
        <div class="sidebar-section" id="edit-panel" style="opacity: 0.5; pointer-events: none; margin-top: 15px;">
            <div class="sidebar-title">🔘 選択中の要素の編集</div>
            <label>表示名</label>
            <input type="text" id="prop-label">
            
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <div style="flex: 1;">
                    <label style="margin-top: 0;">サイズ</label>
                    <input type="range" id="prop-size" min="10" max="80" value="16" oninput="document.getElementById('size-val').innerText=this.value;">
                    <div style="font-size:0.75rem; text-align:center;"><span id="size-val">16</span></div>
                </div>
                <div style="flex: 1;">
                    <label style="margin-top: 0;">文字色</label>
                    <input type="color" id="prop-color" value="#ffffff" style="height: 35px;">
                </div>
            </div>

            <div class="checkbox-group" style="margin-top: 10px;">
                <input type="checkbox" id="prop-bg-toggle">
                <label for="prop-bg-toggle" style="margin:0;">背景色</label>
                <input type="checkbox" id="prop-border-toggle" style="margin-left: 10px;">
                <label for="prop-border-toggle" style="margin:0;">枠線</label>
            </div>
            
            <div class="checkbox-group" style="margin-top: 10px; border-top: 1px dashed #ccc; padding-top: 10px;">
                <input type="checkbox" id="prop-is-label">
                <label for="prop-is-label" style="margin:0; color: #d35400; font-weight: bold;">🔖 ラベル（リンクなし）にする</label>
            </div>
            
            <hr style="border: 0; border-top: 1px solid #ccc; margin: 15px 0;">

            <div class="sidebar-title">🚪 移動先（次階層）の設定</div>
            <p style="font-size: 0.7rem; color: #666; margin-top: 0;">※ラベル設定時は無効になります</p>
            <label>移動先ID</label>
            <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                <input type="text" id="prop-target" style="margin-bottom: 0;">
                <button onclick="jumpToTarget()" style="background: #34495e; color: white; padding: 5px 10px;">🚀</button>
            </div>

            <label>次階層のマップ画像 (自動アップロード)</label>
            <input type="text" id="prop-target-bg" placeholder="ファイル名が自動で入ります" oninput="updatePreview('target-bg-preview', this.value)">
            <input type="file" accept="image/png, image/jpeg" onchange="uploadImageToGitHub(this.files[0], 'prop-target-bg', 'target-bg-preview')">
            <div id="target-bg-preview" class="preview-box"></div>
            
            <button class="btn-full btn-apply" onclick="applyMarkerEdits()" style="margin-top: 15px;">設定を反映</button>
            <button class="btn-full" style="color: #e74c3c; border-color: #e74c3c; margin-top: 10px;" onclick="deleteSelectedMarker()">削除</button>
        </div>

        <button class="btn-full" onclick="toggleGridView()" id="view-toggle-btn">区画一覧（グリッド）</button>
        <div style="flex-grow: 1; min-height: 20px;"></div>
        <button class="btn-full btn-save" onclick="saveToGitHub()">変更をGitHubに保存</button>
    </div>

    <div class="main-content">
        <div id="map-viewport">
            <img id="map-image" src="kokka-map.png" alt="Map">
            <div id="marker-container"></div>
        </div>
        <div id="grid-view">
            <h2 style="margin-top:0;">区画一覧</h2>
            <div class="grid-container" id="grid-container"></div>
        </div>
    </div>
</div>

<script>
    const REPO_OWNER = 'Charlotte5227';
    const REPO_NAME = 'map-Elnora';
    const FILE_PATH = 'data.json';

    let isAdmin = false;
    let githubToken = "";
    let historyStack = [];
    let currentMode = 'map'; 
    let selectedMarkerIndex = null;
    let isDragging = false;
    let draggedElement = null; 
    let isMuted = false;

    let mapData = {
        currentId: "national_01",
        maps: {
            "national_01": { title: "国家全図", image: "kokka-map.png", bgm: "", bgmVolume: 0.5, markers: [] }
        }
    };

    async function initApp() {
        try {
            const isLocal = window.location.protocol === 'file:';
            const fetchUrl = isLocal ? 'data.json' : `data.json?v=${new Date().getTime()}`;
            const response = await fetch(fetchUrl);
            if (response.ok) {
                const textData = await response.text();
                try {
                    const loadedData = JSON.parse(textData);
                    if (loadedData && loadedData.maps) mapData.maps = loadedData.maps;
                } catch (parseError) { console.error("データ読み込みエラー", parseError); }
            }
        } catch (error) { console.warn("初期データの読み込みをスキップしました"); }
        renderMap("national_01");
    }

    function updatePreview(elementId, url) {
        const preview = document.getElementById(elementId);
        if (url && url.trim() !== "") {
            preview.style.backgroundImage = `url(${url})`;
            preview.innerText = "";
        } else {
            preview.style.backgroundImage = "none";
            preview.innerText = "画像なし/未設定";
        }
    }

    function toggleMute() {
        isMuted = !isMuted;
        const audio = document.getElementById('bgm-player');
        const btn = document.getElementById('sound-toggle-btn');
        if (isMuted) {
            audio.pause(); btn.innerText = "🔇";
        } else {
            btn.innerText = "🔊";
            if (audio.src) audio.play().catch(e => console.log("再生ブロック"));
        }
    }

    function updateLiveVolume(val) {
        document.getElementById('map-bgm-vol-val').innerText = val;
        document.getElementById('bgm-player').volume = parseInt(val) / 100;
    }

    // ★ 選択した画像を「画像ファイルとして単体で」GitHubへアップロードする関数
    async function uploadImageToGitHub(file, inputId, previewId) {
        if(!githubToken) {
            alert("画像をアップロードするには、先に「管理者ログイン」を行ってください。");
            document.getElementById(inputId).nextElementSibling.value = ""; // ファイル選択をクリア
            return;
        }
        if(!file) return;

        const btn = document.querySelector('.btn-save');
        btn.innerText = "画像アップロード中...";
        btn.disabled = true;

        const ext = file.name.split('.').pop() || "png";
        const fileName = `img_${Date.now()}.${ext}`; // 自動で一意な名前をつける
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${fileName}`;

        const reader = new FileReader();
        reader.onload = async (e) => {
            const dataUrl = e.target.result;
            const base64Data = dataUrl.split(',')[1]; // Base64の実データ部分だけを抽出

            try {
                const putRes = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${githubToken.trim()}`,
                        'Accept': 'application/vnd.github+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Upload image ${fileName}`,
                        content: base64Data
                    })
                });

                if(putRes.ok) {
                    // アップロード成功時、入力欄に自動で名前をセット
                    document.getElementById(inputId).value = fileName;
                    // プレビューには通信待ち時間を省くため手元のDataURLを表示
                    const preview = document.getElementById(previewId);
                    preview.style.backgroundImage = `url(${dataUrl})`;
                    preview.innerText = "";
                    alert(`「${fileName}」としてGitHubに画像を保存しました！\n反映ボタンを押して適用してください。`);
                } else {
                    const err = await putRes.json();
                    alert("アップロード失敗:\n" + err.message);
                }
            } catch(error) {
                alert("通信エラー:\n" + error.message);
            } finally {
                btn.innerText = "変更をGitHubに保存";
                btn.disabled = false;
                document.getElementById(inputId).nextElementSibling.value = ""; // ファイル選択をリセット
            }
        };
        reader.readAsDataURL(file);
    }

    function renderMap(mapId, isBackAction = false) {
        if(!mapData.maps[mapId]) {
            mapData.maps[mapId] = { title: "新しい区画", image: "kokka-map.png", bgm: "", bgmVolume: 0.5, markers: [] };
        }
        if (!isBackAction && mapData.currentId !== mapId) historyStack.push(mapData.currentId);
        mapData.currentId = mapId;
        document.getElementById('back-btn').style.display = historyStack.length > 0 ? 'inline-block' : 'none';
        
        currentMode = 'map';
        document.getElementById('map-viewport').style.display = 'block';
        document.getElementById('grid-view').style.display = 'none';
        deselectMarker();

        const data = mapData.maps[mapId];
        document.getElementById('map-title').innerText = data.title;
        document.getElementById('map-image').src = data.image || "kokka-map.png";
        
        document.getElementById('map-prop-title').value = data.title || "";
        document.getElementById('map-prop-bg').value = data.image || "";
        updatePreview('map-bg-preview', data.image);
        
        document.getElementById('map-prop-bgm').value = data.bgm || "";
        const vol = data.bgmVolume !== undefined ? data.bgmVolume : 0.5;
        document.getElementById('map-prop-bgm-vol').value = vol * 100;
        document.getElementById('map-bgm-vol-val').innerText = Math.round(vol * 100);
        
        const audio = document.getElementById('bgm-player');
        if (data.bgm && audio.dataset.currentBgm !== data.bgm) {
            audio.src = data.bgm;
            audio.dataset.currentBgm = data.bgm;
            if (!isMuted) audio.play().catch(e => { isMuted = true; document.getElementById('sound-toggle-btn').innerText = "🔇"; });
        } else if (!data.bgm && audio.dataset.currentBgm) {
            audio.pause(); audio.src = ""; audio.dataset.currentBgm = "";
        }
        audio.volume = vol;
        
        const container = document.getElementById('marker-container');
        container.innerHTML = '';

        data.markers.forEach((m, index) => {
            const btn = document.createElement('div');
            btn.className = 'map-marker';
            
            if (m.showBorder) btn.classList.add('has-border');
            if (m.showBg === false) btn.classList.add('no-bg');
            if (m.isLabelOnly) btn.classList.add('is-label');
            
            btn.innerText = m.label || "無名";
            btn.style.left = m.x + "%";
            btn.style.top = m.y + "%";
            
            const baseSize = m.fontSize || 16;
            btn.style.fontSize = (baseSize / 10) + "cqw";
            btn.style.color = m.color || "#ffffff";

            btn.onmousedown = (e) => {
                if(!isAdmin) return;
                e.stopPropagation(); e.preventDefault(); 
                selectMarker(index);
                isDragging = true; draggedElement = btn; 
            };
            
            btn.ontouchstart = (e) => {
                if(!isAdmin) return;
                e.stopPropagation();
                selectMarker(index);
                isDragging = true; draggedElement = btn;
            };

            btn.onclick = (e) => {
                e.stopPropagation();
                if(!isAdmin && !m.isLabelOnly) renderMap(m.targetId);
            };
            container.appendChild(btn);
        });
    }

    function applyMapSettings() {
        mapData.maps[mapData.currentId].title = document.getElementById('map-prop-title').value;
        mapData.maps[mapData.currentId].bgm = document.getElementById('map-prop-bgm').value;
        mapData.maps[mapData.currentId].bgmVolume = parseInt(document.getElementById('map-prop-bgm-vol').value) / 100;
        
        const bgInput = document.getElementById('map-prop-bg').value;
        if(bgInput) mapData.maps[mapData.currentId].image = bgInput;
        
        renderMap(mapData.currentId, true);
        alert("マップ設定を反映しました！");
    }

    function jumpToTarget() {
        const targetId = document.getElementById('prop-target').value;
        if(document.getElementById('prop-is-label').checked) {
            alert("ラベル設定中はジャンプできません。"); return;
        }
        if(targetId) { applyMarkerEdits(); renderMap(targetId); } 
        else { alert("移動先IDが設定されていません。"); }
    }

    function toggleGridView() {
        if (currentMode === 'map') {
            currentMode = 'grid';
            document.getElementById('map-viewport').style.display = 'none';
            document.getElementById('grid-view').style.display = 'block';
            document.getElementById('view-toggle-btn').innerText = "マップに戻る";
            const grid = document.getElementById('grid-container');
            grid.innerHTML = '';
            mapData.maps[mapData.currentId].markers.forEach(m => {
                if(m.isLabelOnly) return; 
                const targetId = m.targetId;
                if(!mapData.maps[targetId]) mapData.maps[targetId] = { title: m.label, image: "kokka-map.png", markers: [] };
                const tMap = mapData.maps[targetId];
                const card = document.createElement('div');
                card.className = 'grid-card';
                card.innerHTML = `<img src="${tMap.image}"><h3 style="margin:10px 0;">${tMap.title}</h3><button class="btn-full" onclick="renderMap('${targetId}')">編集</button>`;
                grid.appendChild(card);
            });
        } else { renderMap(mapData.currentId, true); }
    }

    function addNewMarker() {
        mapData.maps[mapData.currentId].markers.push({
            x: 50, y: 50, fontSize: 16, color: "#ffffff", showBorder: true, showBg: true, isLabelOnly: false,
            label: "新規ボタン", targetId: "map_" + Date.now().toString().slice(-4)
        });
        renderMap(mapData.currentId, true);
    }

    function addNewLabel() {
        mapData.maps[mapData.currentId].markers.push({
            x: 50, y: 50, fontSize: 20, color: "#ffffff", showBorder: false, showBg: false, isLabelOnly: true,
            label: "新規ラベル", targetId: ""
        });
        renderMap(mapData.currentId, true);
    }

    function selectMarker(index) {
        selectedMarkerIndex = index;
        const m = mapData.maps[mapData.currentId].markers[index];
        const panel = document.getElementById('edit-panel');
        panel.style.opacity = 1; panel.style.pointerEvents = 'auto';
        
        document.getElementById('prop-label').value = m.label || "";
        document.getElementById('prop-size').value = m.fontSize || 16;
        document.getElementById('size-val').innerText = m.fontSize || 16;
        document.getElementById('prop-color').value = m.color || "#ffffff";
        document.getElementById('prop-bg-toggle').checked = m.showBg !== false;
        document.getElementById('prop-border-toggle').checked = m.showBorder !== false;
        document.getElementById('prop-is-label').checked = m.isLabelOnly === true;
        
        const targetId = m.targetId || "";
        document.getElementById('prop-target').value = targetId;
        
        const targetBgImg = (targetId && mapData.maps[targetId]) ? mapData.maps[targetId].image : "";
        document.getElementById('prop-target-bg').value = targetBgImg;
        updatePreview('target-bg-preview', targetBgImg);

        document.querySelectorAll('.map-marker').forEach((el, i) => {
            if (i === index) el.classList.add('selected');
            else el.classList.remove('selected');
        });
    }

    function deselectMarker() {
        selectedMarkerIndex = null; draggedElement = null;
        const panel = document.getElementById('edit-panel');
        panel.style.opacity = 0.5; panel.style.pointerEvents = 'none';
        document.querySelectorAll('.map-marker').forEach(el => el.classList.remove('selected'));
    }

    function applyMarkerEdits() {
        if (selectedMarkerIndex === null) return;
        const m = mapData.maps[mapData.currentId].markers[selectedMarkerIndex];
        
        m.label = document.getElementById('prop-label').value;
        m.fontSize = parseInt(document.getElementById('prop-size').value);
        m.color = document.getElementById('prop-color').value;
        m.showBg = document.getElementById('prop-bg-toggle').checked;
        m.showBorder = document.getElementById('prop-border-toggle').checked;
        m.isLabelOnly = document.getElementById('prop-is-label').checked;
        
        if (!m.isLabelOnly) {
            const targetId = document.getElementById('prop-target').value;
            m.targetId = targetId;

            if (!mapData.maps[targetId]) {
                mapData.maps[targetId] = { title: m.label, image: "kokka-map.png", bgm: "", bgmVolume: 0.5, markers: [] };
            }
            
            const targetBgInput = document.getElementById('prop-target-bg').value;
            if (targetBgInput) {
                mapData.maps[targetId].image = targetBgInput;
            }
        }
        
        renderMap(mapData.currentId, true);
        setTimeout(() => selectMarker(selectedMarkerIndex), 50); 
    }

    function deleteSelectedMarker() {
        if (selectedMarkerIndex === null) return;
        if (confirm("削除しますか？")) {
            mapData.maps[mapData.currentId].markers.splice(selectedMarkerIndex, 1);
            deselectMarker(); renderMap(mapData.currentId, true);
        }
    }

    const handleMove = (clientX, clientY) => {
        if(!isDragging || selectedMarkerIndex === null || !draggedElement) return;
        const viewport = document.getElementById('map-viewport');
        const rect = viewport.getBoundingClientRect();
        let x = Math.max(0, Math.min(100, ((clientX - rect.left) / rect.width) * 100));
        let y = Math.max(0, Math.min(100, ((clientY - rect.top) / rect.height) * 100));
        draggedElement.style.left = x.toFixed(2) + "%";
        draggedElement.style.top = y.toFixed(2) + "%";
        mapData.maps[mapData.currentId].markers[selectedMarkerIndex].x = x.toFixed(2);
        mapData.maps[mapData.currentId].markers[selectedMarkerIndex].y = y.toFixed(2);
    };

    window.onmousemove = (e) => handleMove(e.clientX, e.clientY);
    window.ontouchmove = (e) => handleMove(e.touches[0].clientX, e.touches[0].clientY);
    window.onmouseup = window.ontouchend = () => { isDragging = false; draggedElement = null; };

    function goBack() { if (historyStack.length > 0) renderMap(historyStack.pop(), true); }

    function toggleAdmin() {
        if(!isAdmin) {
            document.getElementById('login-modal').style.display = 'flex';
            document.getElementById('login-pass').value = '';
        } else {
            if(confirm("ログアウトしますか？\n（保存していない変更は破棄されます）")) location.reload();
        }
    }

    function closeLogin() { document.getElementById('login-modal').style.display = 'none'; }

    function executeLogin() {
        const pass = document.getElementById('login-pass').value;
        const token = document.getElementById('login-token').value;
        
        if (pass === "426463") {
            if (token) {
                githubToken = token;
                isAdmin = true;
                document.body.classList.add('is-admin');
                document.getElementById('auth-btn').innerText = "ログアウト";
                closeLogin();
                renderMap(mapData.currentId, true);
            } else { alert("GitHub Tokenを入力してください。"); }
        } else { alert("パスワードが違います。"); }
    }

    async function saveToGitHub() {
        if(!githubToken) return;
        const cleanToken = githubToken.trim(); 
        const btn = document.querySelector('.btn-save');
        btn.innerText = "通信中...";
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
        
        const headers = { 
            'Authorization': `Bearer ${cleanToken}`,
            'Accept': 'application/vnd.github+json',
            'X-GitHub-Api-Version': '2022-11-28'
        };

        try {
            const getRes = await fetch(url, { headers: headers, cache: 'no-store' });
            let fileSha = undefined;
            if (getRes.ok) {
                const data = await getRes.json();
                fileSha = data.sha;
            }

            const jsonString = JSON.stringify({ maps: mapData.maps }, null, 2);
            const encodedContent = btoa(unescape(encodeURIComponent(jsonString)));
            
            const putRes = await fetch(url, {
                method: 'PUT',
                headers: { ...headers, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Update map data", content: encodedContent, sha: fileSha })
            });

            if (putRes.ok) alert("GitHubへの保存完了！\n変更は1〜3分後に反映されます。");
            else {
                const errorData = await putRes.json();
                alert(`保存失敗:\n${errorData.message}`);
            }
        } catch (e) { alert(`通信エラー:\n${e.message}`); }
        btn.innerText = "変更をGitHubに保存";
    }

    initApp();
</script>
</body>
</html>
