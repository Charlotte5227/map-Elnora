<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>エルノーラ地図管理システム</title>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f0f2f5; --admin-bg: #ecf0f1; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background: var(--bg); color: #333; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; flex-shrink: 0; }
        .header h1 { margin: 0; font-size: 1.2rem; }
        button { cursor: pointer; border: none; border-radius: 4px; font-weight: bold; padding: 8px 15px; transition: 0.2s; }
        #auth-btn { background: white; color: var(--primary); }
        #back-btn { background: #34495e; color: white; margin-right: 15px; display: none; }

        .app-container { display: flex; flex-grow: 1; overflow: hidden; }
        
        .sidebar { width: 300px; background: white; border-right: 2px solid #ddd; padding: 20px; box-sizing: border-box; display: none; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
        .sidebar-section { border: 1px solid #ccc; padding: 15px; margin-bottom: 15px; border-radius: 5px; background: #fafafa; }
        .sidebar-title { font-size: 1rem; margin: 0 0 10px 0; border-bottom: 2px solid #333; padding-bottom: 5px; }
        .sidebar label { display: block; font-size: 0.8rem; font-weight: bold; margin-top: 10px; margin-bottom: 5px; }
        .sidebar input[type="text"], .sidebar input[type="range"] { width: 100%; box-sizing: border-box; margin-bottom: 5px; }
        #bg-preview { width: 100%; height: 100px; border: 1px dashed #aaa; margin-top: 5px; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 0.8rem; }
        .btn-full { width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #333; background: white; }
        .btn-full:hover { background: #eee; }
        .btn-save { background: #e74c3c; color: white; border: none; font-size: 1.1rem; }

        .main-content { flex-grow: 1; padding: 20px; overflow: auto; display: flex; justify-content: center; align-items: flex-start; position: relative; }
        #map-viewport { position: relative; width: 100%; max-width: 1000px; background: white; box-shadow: 0 5px 20px rgba(0,0,0,0.1); touch-action: none; display: block; }
        #map-image { width: 100%; display: block; user-select: none; -webkit-user-drag: none; }

        #grid-view { display: none; width: 100%; max-width: 1200px; padding: 20px; box-sizing: border-box; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .grid-card { background: white; border: 1px solid #ccc; border-radius: 8px; padding: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .grid-card img { width: 100%; height: 150px; object-fit: cover; background: #eee; border-radius: 4px; margin-bottom: 10px; }

        .map-marker {
            position: absolute; transform: translate(-50%, -50%);
            background-color: rgba(39, 174, 96, 0.9); background-size: cover; background-position: center;
            color: white; border-radius: 8px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center; text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            transition: transform 0.1s; user-select: none; overflow: hidden;
        }
        .map-marker:hover { transform: translate(-50%, -50%) scale(1.05); }
        
        .editing .map-marker { cursor: move; border: 2px solid transparent; }
        .map-marker.selected { border: 3px solid #f1c40f; z-index: 100; box-shadow: 0 0 15px rgba(241, 196, 15, 0.8); }
        
        body.is-admin .sidebar { display: flex; }
    </style>
</head>
<body>

<div class="header">
    <div style="display: flex; align-items: center;">
        <button id="back-btn" onclick="goBack()">◀ 戻る</button>
        <h1 id="map-title">国家全図</h1>
    </div>
    <button id="auth-btn" onclick="toggleAdmin()">管理者ログイン</button>
</div>

<div class="app-container">
    <div class="sidebar" id="sidebar">
        <h2 style="margin-top: 0; color: #e74c3c; font-size: 1.2rem;">管理パネル</h2>
        <button class="btn-full" style="border-color: #27ae60; color: #27ae60; font-weight: bold;" onclick="addNewMarker()">＋ ボタン追加</button>
        
        <div class="sidebar-section" id="edit-panel" style="opacity: 0.5; pointer-events: none;">
            <div class="sidebar-title">選択中のボタン編集</div>
            <label>ボタン名変更</label>
            <input type="text" id="prop-label" oninput="updateMarkerProp('label', this.value)">
            <label>文字サイズ変更 (<span id="size-val">16</span>px)</label>
            <input type="range" id="prop-size" min="10" max="50" value="16" oninput="updateMarkerProp('fontSize', this.value); document.getElementById('size-val').innerText=this.value;">
            <label>移動先ID</label>
            <input type="text" id="prop-target" oninput="updateMarkerProp('targetId', this.value)">
            <label>ボタン背景画像</label>
            <input type="file" id="prop-bg" accept="image/png, image/jpeg" onchange="handleImageUpload(event)">
            <div id="bg-preview">画像なし</div>
            <button class="btn-full" style="color: #e74c3c; border-color: #e74c3c; margin-top: 20px;" onclick="deleteSelectedMarker()">このボタンを削除</button>
        </div>

        <button class="btn-full" onclick="toggleGridView()" id="view-toggle-btn">各都市画面移動ボタン</button>
        <div style="flex-grow: 1;"></div>
        <button class="btn-full btn-save" onclick="saveToGitHub()">変更を保存</button>
    </div>

    <div class="main-content">
        <div id="map-viewport">
            <img id="map-image" src="kokka-map.png" alt="Map">
            <div id="marker-container"></div>
        </div>
        <div id="grid-view">
            <h2 style="margin-top:0;">区画一覧</h2>
            <div class="grid-container" id="grid-container"></div>
        </div>
    </div>
</div>

<script>
    // --- ユーザー指定設定 ---
    const REPO_OWNER = 'Charlotte5227';
    const REPO_NAME = 'map-Elnora';
    const FILE_PATH = 'data.json';

    let isAdmin = false;
    let githubToken = "";
    let historyStack = [];
    let currentMode = 'map'; 
    let selectedMarkerIndex = null;
    let isDragging = false;

    // 初期状態：kokka-map.png を背景にする
    let mapData = {
        currentId: "national_01",
        maps: {
            "national_01": { title: "国家全図", image: "kokka-map.png", markers: [] }
        }
    };

    function renderMap(mapId, isBackAction = false) {
        if(!mapData.maps[mapId]) {
            mapData.maps[mapId] = { title: "新しい区画", image: "kokka-map.png", markers: [] };
        }

        if (!isBackAction && mapData.currentId !== mapId) historyStack.push(mapData.currentId);
        mapData.currentId = mapId;
        document.getElementById('back-btn').style.display = historyStack.length > 0 ? 'inline-block' : 'none';
        
        currentMode = 'map';
        document.getElementById('map-viewport').style.display = 'block';
        document.getElementById('grid-view').style.display = 'none';
        document.getElementById('view-toggle-btn').innerText = "各都市画面移動ボタン";
        deselectMarker();

        const data = mapData.maps[mapId];
        document.getElementById('map-title').innerText = data.title;
        document.getElementById('map-image').src = data.image;
        
        const container = document.getElementById('marker-container');
        container.innerHTML = '';

        data.markers.forEach((m, index) => {
            const btn = document.createElement('div');
            btn.className = 'map-marker';
            if (index === selectedMarkerIndex) btn.classList.add('selected');
            
            btn.innerText = m.label || "無名";
            btn.style.left = m.x + "%";
            btn.style.top = m.y + "%";
            btn.style.width = (m.width || 120) + "px";
            btn.style.height = (m.height || 60) + "px";
            btn.style.fontSize = (m.fontSize || 16) + "px";
            
            if (m.bgImage) {
                btn.style.backgroundImage = `url(${m.bgImage})`;
                btn.style.backgroundColor = "transparent";
            }

            btn.onmousedown = (e) => {
                if(!isAdmin) return;
                e.stopPropagation();
                selectMarker(index);
                isDragging = true;
            };

            btn.onclick = (e) => {
                e.stopPropagation();
                if(!isAdmin) renderMap(m.targetId);
            };
            container.appendChild(btn);
        });
    }

    function toggleGridView() {
        if (currentMode === 'map') {
            currentMode = 'grid';
            document.getElementById('map-viewport').style.display = 'none';
            document.getElementById('grid-view').style.display = 'block';
            document.getElementById('view-toggle-btn').innerText = "マップに戻る";
            const grid = document.getElementById('grid-container');
            grid.innerHTML = '';
            const markers = mapData.maps[mapData.currentId].markers;
            markers.forEach(m => {
                const targetId = m.targetId;
                if(!mapData.maps[targetId]) mapData.maps[targetId] = { title: m.label, image: "kokka-map.png", markers: [] };
                const tMap = mapData.maps[targetId];
                const card = document.createElement('div');
                card.className = 'grid-card';
                card.innerHTML = `<img src="${tMap.image}"><h3 style="margin:10px 0;">${tMap.title}</h3><button class="btn-full" onclick="renderMap('${targetId}')">編集</button>`;
                grid.appendChild(card);
            });
        } else { renderMap(mapData.currentId, true); }
    }

    function addNewMarker() {
        mapData.maps[mapData.currentId].markers.push({
            x: 50, y: 50, width: 120, height: 60, fontSize: 16,
            label: "新規ボタン", targetId: "map_" + Date.now().toString().slice(-4), bgImage: ""
        });
        renderMap(mapData.currentId, true);
        selectMarker(mapData.maps[mapData.currentId].markers.length - 1);
    }

    function selectMarker(index) {
        selectedMarkerIndex = index;
        const m = mapData.maps[mapData.currentId].markers[index];
        const panel = document.getElementById('edit-panel');
        panel.style.opacity = 1; panel.style.pointerEvents = 'auto';
        document.getElementById('prop-label').value = m.label;
        document.getElementById('prop-size').value = m.fontSize;
        document.getElementById('size-val').innerText = m.fontSize;
        document.getElementById('prop-target').value = m.targetId;
        const preview = document.getElementById('bg-preview');
        if (m.bgImage) { preview.style.backgroundImage = `url(${m.bgImage})`; preview.innerText = ""; }
        else { preview.style.backgroundImage = "none"; preview.innerText = "画像なし"; }
        renderMap(mapData.currentId, true);
    }

    function deselectMarker() {
        selectedMarkerIndex = null;
        const panel = document.getElementById('edit-panel');
        panel.style.opacity = 0.5; panel.style.pointerEvents = 'none';
    }

    function updateMarkerProp(key, value) {
        if (selectedMarkerIndex === null) return;
        mapData.maps[mapData.currentId].markers[selectedMarkerIndex][key] = value;
        renderMap(mapData.currentId, true);
    }

    function deleteSelectedMarker() {
        if (selectedMarkerIndex === null) return;
        if (confirm("削除しますか？")) {
            mapData.maps[mapData.currentId].markers.splice(selectedMarkerIndex, 1);
            deselectMarker(); renderMap(mapData.currentId, true);
        }
    }

    function handleImageUpload(event) {
        if (selectedMarkerIndex === null || !event.target.files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => { updateMarkerProp('bgImage', e.target.result); selectMarker(selectedMarkerIndex); };
        reader.readAsDataURL(event.target.files[0]);
    }

    window.onmousemove = (e) => {
        if(!isDragging || selectedMarkerIndex === null) return;
        const viewport = document.getElementById('map-viewport');
        const rect = viewport.getBoundingClientRect();
        let x = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
        let y = Math.max(0, Math.min(100, ((e.clientY - rect.top) / rect.height) * 100));
        mapData.maps[mapData.currentId].markers[selectedMarkerIndex].x = x.toFixed(2);
        mapData.maps[mapData.currentId].markers[selectedMarkerIndex].y = y.toFixed(2);
        renderMap(mapData.currentId, true);
    };
    
    window.onmouseup = () => { isDragging = false; };
    
    function goBack() { if (historyStack.length > 0) renderMap(historyStack.pop(), true); }

    function toggleAdmin() {
        if(!isAdmin) {
            if(prompt("PASS:") === "426463") {
                githubToken = prompt("GitHub Token:");
                if(githubToken) {
                    isAdmin = true;
                    document.body.classList.add('is-admin', 'editing');
                    document.getElementById('auth-btn').innerText = "ログアウト";
                    renderMap(mapData.currentId, true);
                }
            }
        } else { location.reload(); }
    }

    async function saveToGitHub() {
        if(!githubToken) return;
        const btn = document.querySelector('.btn-save');
        btn.innerText = "保存中...";
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
        try {
            const getRes = await fetch(url, { headers: { 'Authorization': `token ${githubToken}` } });
            const fileSha = getRes.ok ? (await getRes.json()).sha : undefined;
            const putRes = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${githubToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Update data",
                    content: btoa(unescape(encodeURIComponent(JSON.stringify({ maps: mapData.maps }, null, 2)))),
                    sha: fileSha
                })
            });
            if (putRes.ok) alert("GitHubへ保存しました。");
        } catch (e) { alert("エラー: " + e.message); }
        btn.innerText = "変更を保存";
    }

    renderMap("national_01");
</script>
</body>
</html>
